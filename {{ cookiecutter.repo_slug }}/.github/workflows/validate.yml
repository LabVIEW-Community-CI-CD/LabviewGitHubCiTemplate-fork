            )
            $current = $InputObject
            foreach ($segment in $Path.Split('.')) {
              if ($current -is [System.Collections.IDictionary]) {
                if (-not $current.Contains($segment)) {
                  return $null
                }
                $current = $current[$segment]
                continue

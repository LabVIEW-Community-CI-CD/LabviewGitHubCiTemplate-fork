name: docker-profile

on:
  workflow_dispatch:
    inputs:
      proving_reason:
        description: Why this Docker consumer lane is being dispatched.
        required: false
        default: manual

permissions:
  contents: read

jobs:
  docker-consumer-lane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read Docker consumer lane contract
        id: contract
        shell: pwsh
        run: |
          $receiptPath = & .github/comparevi/Emit-DockerProfileReceipt.ps1 -RepositoryRoot $PWD.Path
          $receipt = Get-Content -LiteralPath $receiptPath -Raw | ConvertFrom-Json -AsHashtable
          "receipt_path=$receiptPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if ($env:GITHUB_STEP_SUMMARY) {
            @(
              '### Docker consumer lane',
              '',
              ('- proving_reason: `{0}`' -f '{% raw %}${{ inputs.proving_reason || ''manual'' }}{% endraw %}'),
              ('- requested_execution_profile: `{0}`' -f $receipt.requestedExecutionProfile),
              ('- authoritative_consumer_pin: `{0}`' -f $receipt.authoritativeConsumerPin),
              ('- authoritative_image_contract_source: `{0}`' -f $receipt.authoritativeImageContractSource),
              ('- hosted_surface_retained: `{0}`' -f $receipt.hostedSurfaceRetained.ToString().ToLowerInvariant()),
              ('- lane_policy_path: `{0}`' -f $receipt.lanePolicyPath),
              ('- capability_manifest_path: `{0}`' -f $receipt.capabilityManifestPath),
              ('- integration_doc_path: `{0}`' -f $receipt.integrationDocPath),
              ('- runtime_ownership: `{0}`' -f $receipt.runtimeOwnership)
            ) -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Upload Docker lane receipt
        uses: actions/upload-artifact@v4
        with:
          name: docker-profile-plan
          path: {% raw %}${{ steps.contract.outputs.receipt_path }}{% endraw %}
